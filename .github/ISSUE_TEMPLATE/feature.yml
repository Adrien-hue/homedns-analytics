name: Feature request
description: Propose a new capability or improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the problem or limitation this feature would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the expected behavior.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - DNS service
        - Backend API
        - Frontend
        - Database
        - Infrastructure
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe alternative solutions or workarounds.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...