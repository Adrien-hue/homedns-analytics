name: Bug report
description: Report reproducible incorrect behavior
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem with HomeDNS Analytics.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem clearly.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Start...
        2. Configure...
        3. Run...
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Architecture:
        Browser:
        Project version or commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, IP addresses, and other sensitive data.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I searched for an existing issue describing this problem.
          required: true
        - label: I removed secrets and sensitive network information.
          required: true